[profile]
root_dir = "/path/to/marrow-bot"
source_context_dir = "/path/to/marrow-bot/context.d"

[service]
mode = "single_user"

[ipc]
enabled = true

[self_check]
enabled = true
interval_seconds = 900
wake_agent = "orchestrator"

[sync]
enabled = false

[[agents]]
user = "marrow"
name = "orchestrator"
heartbeat_interval = 10800  # every 3 hours
heartbeat_timeout = 7200
workspace = "/Users/marrow"
agent_command = "/path/to/opencode run --agent orchestrator"
context_dirs = [
  "/Users/marrow/context.d",
]
