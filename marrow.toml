[profile]
root_dir = "/opt/marrow-bot"

[service]
mode = "single_user"
config_path = "/opt/marrow-bot/marrow.toml"

[ipc]
enabled = true

[self_check]
enabled = true
interval_seconds = 900
wake_agent = "orchestrator"

[sync]
enabled = false

[[agents]]
user = "marrow"
name = "orchestrator"
heartbeat_interval = 10800  # every 3 hours
heartbeat_timeout = 7200
agent_command = "opencode run --agent orchestrator"
